services:
  mysql:
    image: mysql:8.0
    container_name: terangacare-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: terangacare
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: terangacare-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      APP_ENV: production
      DATABASE_URL: mysql+pymysql://root:root@mysql:3306/terangacare
      JWT_SECRET_KEY: development-secret-key
      JWT_ISSUER: terangacare-api
      JWT_AUDIENCE: terangacare-web
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      CORS_ORIGINS: http://localhost:5173
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    image: node:20-alpine
    container_name: terangacare-frontend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend
    env_file:
      - ./.env
    environment:
      VITE_APP_ENV: production
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  mysql_data:
  frontend_node_modules: