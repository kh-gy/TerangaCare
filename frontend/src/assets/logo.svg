<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="TerangaCare">
  <defs>
    <linearGradient id="tcGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3c6e"/>
      <stop offset="55%" stop-color="#2c5fa5"/>
      <stop offset="100%" stop-color="#2aab8e"/>
    </linearGradient>
    <linearGradient id="tcGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Squircle de marque -->
  <rect width="48" height="48" rx="13" fill="url(#tcGrad)"/>
  <rect width="48" height="24" rx="13" fill="url(#tcGloss)"/>

  <!-- Anneau « teranga » : l'accueil, l'étreinte -->
  <circle cx="24" cy="24" r="15" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.8"/>

  <!-- Croix de santé -->
  <rect x="20.6" y="12.4" width="6.8" height="23.2" rx="3.4" fill="#ffffff"/>
  <rect x="12.4" y="20.6" width="23.2" height="6.8" rx="3.4" fill="#ffffff"/>
</svg>
